# Strata - Lightweight Session Sandbox Service Configuration
#
# 可用配置项说明：
#   server.addr           HTTP/WS 服务监听地址
#   server.access_log     访问日志文件路径，空则输出到 stdout
#   sandbox.base_rootfs   基础只读根文件系统路径（可选，不设置则用宿主机目录）
#   sandbox.session_root  session 工作目录根（所有 session 的 upper/work/merged 在此下）
#   sandbox.session_ttl   session 不活跃超时时间
#   sandbox.max_sessions  全局最大 session 数量
#   sandbox.isolate_network 是否为每个 session 创建独立网络命名空间
#   sandbox.overlay_driver overlay 驱动：fuse | kernel | none
#   grpc.addr             gRPC 服务监听地址

server:
  addr: ":8080"
  # access_log: "/var/log/strata/access.log"  # 注释掉则输出到 stdout

sandbox:
  base_rootfs: ""                     # 不设置则自动 fallback 到宿主机目录
  session_root: "/tmp/strata/sessions"
  session_ttl: "30m"                   # 30 分钟无活动则自动清理
  max_sessions: 100
  isolate_network: false
  overlay_driver: "fuse"               # fuse（推荐）| kernel | none

grpc:
  addr: ":9090"
